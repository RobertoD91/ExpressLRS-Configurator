name: macOS signing test

# Manual smoke test for the macOS signing + notarization setup: builds the
# arm64 app, lets electron-builder sign and notarize it (without publishing a
# release), then verifies the result explicitly. It never runs automatically,
# only via the "Run workflow" button.
#
# Security: the signing secrets are exposed to the build step ONLY, so the
# dependency install (which runs each package's install scripts) never sees
# them. electron-builder does the signing and notarization itself - there is no
# custom signing script.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sign:
    runs-on: macos-latest # Apple Silicon (arm64)
    timeout-minutes: 60
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v6

      - name: Install Node, NPM and Yarn
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install setuptools
        run: pip install setuptools

      # Cache the heavy downloads (Electron, electron-builder tools, and the
      # portable python + git) so re-runs go straight to the signing step.
      - name: Cache build inputs
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            dependencies/darwin_arm64
          key: macos-signtest-${{ hashFiles('yarn.lock', 'dependencies/download-mac-dependencies.sh') }}

      # No signing secrets are in scope here, so a malicious dependency install
      # script cannot read them.
      - name: Install dependencies
        run: yarn install --prefer-offline --network-timeout 180000

      - name: Download macOS portable dependencies (arm64)
        run: ./dependencies/download-mac-dependencies.sh arm64

      # The signing secrets are scoped to this single step.
      - name: Build, sign and notarize (arm64, no publish)
        env:
          CSC_LINK: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          if [ -z "$CSC_LINK" ] || [ -z "$APP_STORE_CONNECT_API_KEY_BASE64" ]; then
            echo "::error::macOS signing secrets are not configured on this repository."
            exit 1
          fi
          # electron-builder wants APPLE_API_KEY to be the path to the .p8 file
          APPLE_API_KEY="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$APPLE_API_KEY"
          export APPLE_API_KEY
          yarn build
          yarn electron-builder --arm64 --mac --publish never

      # Independent confirmation that the signature, notarization and stapling
      # are actually valid - not just that electron-builder did not error. No
      # secrets are needed to read the signature back.
      - name: Verify signature, notarization and stapling
        run: |
          APP="$(find release -maxdepth 3 -name '*.app' -type d | head -1)"
          DMG="$(find release -maxdepth 2 -name '*.dmg' | head -1)"
          if [ -z "$APP" ]; then
            echo "::error::no .app was produced"
            exit 1
          fi
          echo "App: $APP"
          echo "DMG: ${DMG:-<none>}"

          echo "== codesign --verify (signature integrity, hardened runtime) =="
          codesign --verify --deep --strict --verbose=2 "$APP"

          echo "== signing authority + team =="
          codesign --display --verbose=2 "$APP" 2>&1 | grep -Ei 'Authority=|TeamIdentifier=' || true

          echo "== Gatekeeper: must be accepted as Notarized Developer ID =="
          spctl --assess --type execute --verbose=2 "$APP"

          echo "== notarization ticket stapled to the app =="
          xcrun stapler validate "$APP"

          echo "== notarization ticket stapled to the dmg =="
          if [ -z "$DMG" ]; then
            echo "::error::no .dmg was produced"
            exit 1
          fi
          xcrun stapler validate "$DMG"

          echo "OK: the app and the dmg are signed, notarized and stapled."
