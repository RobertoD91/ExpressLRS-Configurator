name: Publish

on: workflow_dispatch

# creating releases and uploading their assets needs a writable token, the
# default workflow token is read only on newer repositories
permissions:
  contents: write

jobs:
  publish:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ['ubuntu-22.04', 'windows-2022', 'macos-15']
    steps:
      - name: Setup apt dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt-get install --no-install-recommends -y libarchive-tools rpm

      - name: Checkout git repo
        uses: actions/checkout@v6

      - name: Install Node, NPM and Yarn
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # required for node gyp / serialport module
      - name: Install setuptools
        run: pip install setuptools

      - name: Install dependencies
        run: |
          yarn install --prefer-offline --network-timeout 180000

      - name: Publish Windows releases
        if: matrix.os == 'windows-2022'
        shell: powershell
        env:
          # These values are used for auto updates signing
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_ID_PASS: ${{ secrets.APPLE_ID_PASS }}
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # This is used for uploading release assets to github
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          yarn build
          yarn electron-builder --publish always --x64 --win "-c.publish.owner=${{ github.repository_owner }}" "-c.publish.repo=${{ github.event.repository.name }}"

      - name: Download macOS portable dependencies
        if: matrix.os == 'macos-15'
        run: |
          ./dependencies/download-mac-dependencies.sh x64
          ./dependencies/download-mac-dependencies.sh arm64

      - name: Publish macOS releases
        if: matrix.os == 'macos-15'
        env:
          # Signing + notarization, see docs/macos-code-signing.md. When the
          # secrets are absent (forks, upstream) the build stays unsigned and
          # the workflow still succeeds, exactly like before.
          # electron-builder reads the base64 .p12 straight from CSC_LINK.
          CSC_LINK: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          # Notarization authenticates with the App Store Connect API key.
          APPLE_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          # This is used for uploading release assets to github
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$CSC_LINK" ]; then
            # no certificate: build unsigned, drop every signing/notarization var
            unset CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY_ID APPLE_API_ISSUER
          elif [ -n "$APP_STORE_CONNECT_API_KEY_BASE64" ]; then
            # electron-builder wants APPLE_API_KEY to be the path to the .p8 file
            APPLE_API_KEY="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$APPLE_API_KEY"
            export APPLE_API_KEY
          else
            # certificate but no API key: sign without notarizing
            unset APPLE_API_KEY_ID APPLE_API_ISSUER
          fi
          yarn build
          yarn electron-builder --publish always --x64 --arm64 --mac "-c.publish.owner=${{ github.repository_owner }}" "-c.publish.repo=${{ github.event.repository.name }}"

      # electron-builder uploads each DMG the moment it is built - before the
      # afterAllArtifactBuild hook (.erb/scripts/notarize-dmg.js) notarizes and
      # staples it - and then refuses to publish the same file again ("already
      # published"). The release would otherwise keep the un-stapled DMG. Swap in
      # the stapled local copies here, now that the hook has finished. This only
      # does anything when notarization actually ran (App Store Connect API key
      # present); unsigned forks/upstream skip it and keep electron-builder's DMG.
      - name: Attach the notarized, stapled macOS DMGs to the release
        if: matrix.os == 'macos-15'
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          if [ -z "$APP_STORE_CONNECT_API_KEY_BASE64" ]; then
            echo "notarization not configured; DMGs were not stapled, nothing to re-upload"
            exit 0
          fi
          VERSION="$(node -p "require('./release/app/package.json').version")"
          TAG="v${VERSION}"
          echo "Resolving release $TAG (drafts included)"
          REL_ID="$(gh api "repos/$OWNER/$REPO/releases?per_page=100" \
            --jq "map(select(.tag_name==\"$TAG\")) | .[0].id // empty")"
          if [ -z "$REL_ID" ]; then
            echo "::error::release $TAG not found; cannot attach the stapled DMGs"
            exit 1
          fi
          echo "Release id: $REL_ID"
          # Remove the un-stapled DMGs electron-builder uploaded during the build.
          # Matching on the .dmg extension is immune to GitHub's space->dot rename.
          # The delete-asset endpoint is /releases/assets/{id} - it does NOT take
          # the release id (only the list and upload endpoints do). A 404 means the
          # asset is already gone, which is the state we want, so tolerate it.
          gh api "repos/$OWNER/$REPO/releases/$REL_ID/assets?per_page=100" \
            --jq '.[] | select(.name | endswith(".dmg")) | .id' \
          | while read -r asset_id; do
              [ -n "$asset_id" ] || continue
              echo "Deleting old DMG asset $asset_id"
              gh api --method DELETE "repos/$OWNER/$REPO/releases/assets/$asset_id" \
                || echo "asset $asset_id already gone, continuing"
            done
          # Upload the stapled DMGs the hook left in release/.
          for dmg in release/*.dmg; do
            [ -e "$dmg" ] || continue
            name="$(basename "$dmg" | tr ' ' '.')"
            echo "Uploading stapled $name"
            gh api --method POST \
              -H "Content-Type: application/octet-stream" \
              "https://uploads.github.com/repos/$OWNER/$REPO/releases/$REL_ID/assets?name=$name" \
              --input "$dmg"
          done
          echo "Done: the release now carries the notarized, stapled DMGs."

      - name: Publish Linux releases
        if: matrix.os == 'ubuntu-22.04'
        env:
          # These values are used for auto updates signing
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_ID_PASS: ${{ secrets.APPLE_ID_PASS }}
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # This is used for uploading release assets to github
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          yarn build
          yarn electron-builder --publish always --x64 --linux "-c.publish.owner=${{ github.repository_owner }}" "-c.publish.repo=${{ github.event.repository.name }}"
